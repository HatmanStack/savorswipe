# lychee link checker config
# Run locally with: cargo install lychee && lychee --config lychee.toml '**/*.md'
# In CI we use lycheeverse/lychee-action.

exclude_path = [
  "node_modules",
  "frontend/node_modules",
  "dist",
  "frontend/dist",
  "backend/.venv",
  ".venv",
  "docs/plans",
]

# Treat these HTTP responses as success.
accept = [200, 201, 202, 203, 204, 206, 301, 302, 303, 304, 307, 308, 403, 429]

# Network politeness
max_concurrency = 8
timeout = 20
retry_wait_time = 2
max_retries = 2

# Skip example/placeholder hosts that never resolve.
exclude = [
  "^https?://(?:www\\.)?example\\.(?:com|org|net)",
  "^https?://your-",
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "\\{.*\\}",
]
